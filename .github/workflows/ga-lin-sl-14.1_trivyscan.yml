name: LIN14.1 - Trivy DevSecOps Security Scan

on:
    workflow_dispatch:
    push:
      branches:
        - main

permissions:
  contents: read
  security-events: write
  actions: read

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/py-app
  IMAGE_TAG: ${{ github.sha }}

jobs:
   security-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: HIGH,CRITICAL,LOW,MEDIUM
          exit-code: 1
          format: table

      - name: DOCKERHUB LOGIN
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_PAT }}

#image build and push
      - name: Login to Docker Hub and Build Image
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG .
          docker push $IMAGE_NAME:$IMAGE_TAG

#image scan
      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          exit-code: 1
          format: table      

      - name: Generate Trivy SARIF Report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-results.sarif
      # ==========================================================
      # Upload SARIF Report
      # ==========================================================
      - name: Upload Trivy SARIF Report
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
      # ==========================================================
      - name: SARIF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif-report
          path: trivy-results.sarif

      # ==========================================================
      - name: Generate SBOM
        run: |
         trivy image --format cyclonedx -o sbom.json ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
      # ==========================================================
      # Upload SBOM Artifact
      # ==========================================================
      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-report
          path: sbom.json

      # ==========================================================
      - name: Installing COSIGN in env
        uses: sigstore/cosign-installer@v3

      - name: MOving Cosign Key Pairs
        run: |
          echo "${{ secrets.COSIGN_PRIVATE_KEY }}" > cosign.key
          echo "${{ secrets.COSIGN_PUBLIC_KEY }}" > cosign.pub
      
      - name : Sign certificate with Cosign
        run: |
         cosign sign --yes --key cosign.key ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
        
      - name: Verifying Cosign Images
        run: |
          cosign verify --key cosign.pub ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}