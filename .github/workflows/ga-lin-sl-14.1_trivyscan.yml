name: LIN14.1 - Trivy DevSecOps Security Scan

on:
    workflow_dispatch:

jobs:
   security-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: 1