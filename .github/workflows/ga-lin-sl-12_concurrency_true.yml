name: LIN12_true - Concurrency - TRUE
on:
    workflow_dispatch:

concurrency:
  group: "ga-lin-sl-12-${{ github.ref }}" 
  cancel-in-progress: true           # if "TRUE" - it cancels all currently running jobs in the same group, if "FALSE" - it allows all jobs to run one by one in sequence and wait for the previous one to finish before starting the next one 

jobs:
  example-job:
    runs-on: ubuntu-latest

    steps:
      - name: Simple Echo Step
        run: |
         echo "Performing Action - Concurrency Example"
         echo "This job will be cancelled if another workflow run is triggered while this one is still running."