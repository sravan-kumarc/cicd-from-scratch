name: LIN4 - Artifacts Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: runner Details
        run: |
             echo "This is the runner details"
             echo "Runner OS: $RUNNER_OS"
             echo "Runner Architecture: $RUNNER_ARCH"
             echo "Runner Name: $RUNNER_NAME"
             
      - uses: actions/checkout@v4

      - name: Create artifact
        run: |
            mkdir -p artifactsdir
            echo "This is an artifact" > artifact.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-artifact
          path: artifactsdir/artifact.txt


  download:
      needs: build
      runs-on: ubuntu-latest
      steps:
        # # - name: Download artifact
        # #   uses: actions/download-artifact@v4
        # #   with:
        # #     name: my-artifact
        # #     path: artifactsdir
         - name: runner Details
           run: |
             echo "This is the runner details"
             echo "Runner OS: $RUNNER_OS"
             echo "Runner Architecture: $RUNNER_ARCH"
             echo "Runner Name: $RUNNER_NAME"

         - name: withoutDownload artifact || Show artifact content
           run: cat artifactsdir/artifact.txt

           

         - name: Regular echo without download
           run: echo "This is a regular echo without downloading the artifact"