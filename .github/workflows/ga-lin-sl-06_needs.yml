name: LIN6 - Orchestrated Pipeline

on:
    push:
        branches:
            - main

jobs:

  build-artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Build package
        run: echo "Build complete" > build.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build.txt


  validate-build:
    runs-on: ubuntu-latest
    needs: build-artifact

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Validate build
        run: |
          echo "Validating..."
          cat build.txt


  deploy-release:
    runs-on: ubuntu-latest
    needs: validate-build

    steps:
      - name: Deploy
        run: echo "Deploying to environment"