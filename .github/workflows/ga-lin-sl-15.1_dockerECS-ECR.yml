name: LIN-15.1 Docker Build and Deploy to ECS
on:
  workflow_dispatch:
  push: 
    branches:
      - main

permissions:
  id-token: write
  contents: read
  security-events: write

jobs:
    build-and-deploy:
        name: Build Docker Image and Deploy to ECS
        runs-on: ubuntu-latest
    
        steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            role-to-assume: ${{ secrets.AWS_ROLE_ARN_MAIN }}
            aws-region: ${{ secrets.AWS_REGION }}
    
        - name: Login to Amazon ECR
          id: login-ecr
          uses: aws-actions/amazon-ecr-login@v2
          with:
            mask-password: false

        - name: Build, tag, and push image to Amazon ECR
          id: build-image
          env:
            ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
            ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
            IMAGE_TAG: ${{ github.sha }}
            IMAGE_URI: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          run: |
            docker build -t $IMAGE_URI .
            docker push $IMAGE_URI

            echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

        - name: Storing TaskDef as JSON output
          run: |
           aws ecs describe-task-definition \
           --task-definition ${{ secrets.ECS_TASK_DEFINITION }} \
           --query taskDefinition \
           --region ${{ secrets.AWS_REGION }} > ecs-task-def.json

        - name: Deploy to Amazon ECS
          id: deploy-ecs
          uses: aws-actions/amazon-ecs-deploy-task-definition@v1
          with:
            task-definition: ecs-task-def.json
            service: ${{ secrets.ECS_SERVICE }}
            cluster: ${{ secrets.ECS_CLUSTER }}
            image: ${{ steps.build-image.outputs.image_uri }}