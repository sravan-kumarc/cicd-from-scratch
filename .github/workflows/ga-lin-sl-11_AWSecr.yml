name: LIN11 - Docker Build & Push

on:
 workflow_dispatch:


permissions:
    id-token: write
    contents: read

jobs:
  pre-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Simple Echo Step
        run: |
         echo "Performing Action - AWS oidc pre-checks"

  s3-buckets-list-pulls:
    runs-on: ubuntu-latest
    needs: pre-checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Configure AWS with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Verify identity
        run: aws sts get-caller-identity


      - name: S1. Login to ECR
        run: |
         aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin ${{ secrets.AWS_ORG_ID}}.dkr.ecr.ap-south-1.amazonaws.com

      - name: S2. Build Docker image
        run: |
         docker build -t py_app:${{ github.sha }} .

      - name: S3. Tagging and Pushing
        run: |
         docker tag py_app:${{ github.sha }} ${{ secrets.AWS_ORG_ID}}.dkr.ecr.ap-south-1.amazonaws.com/py_app:${{ github.sha }}
         docker push ${{ secrets.AWS_ORG_ID}}.dkr.ecr.ap-south-1.amazonaws.com/py_app:${{ github.sha }}
