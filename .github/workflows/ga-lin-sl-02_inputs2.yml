name: LIN2 - Pipeline with Inputs

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      artifacts_tag:
        description: 'Artifact to deploy (* for latest, or specific tag)'
        required: true
        default: 'latest'
        

jobs:
  init:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Action
        uses: actions/checkout@v4

      - name: Print message
        run: echo "Deploying to ${{ github.event.inputs.environment }} environment! Artifact: ${{ github.event.inputs.artifacts_tags }}"
