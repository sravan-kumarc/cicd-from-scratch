apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: dep-base
  name: dep-base
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dep-base
  template:
    metadata:
      labels:
        app: dep-base
    spec:
      containers:
      - image: nginx
        name: nginx
        ports:
        - containerPort: 5000
        
